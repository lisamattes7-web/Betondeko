<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Betondeko</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#fff;--border:#e8e8e0;--border2:#d0d0c8;
  --text:#1a1a18;--text2:#666;--text3:#888;--text4:#bbb;
  --green:#1D9E75;--green2:#0F6E56;--green3:#085041;
  --green-bg:#E1F5EE;--tag-bg:#EEEDFE;--tag-color:#3C3489;
  --chip-bg:#fff;--nav-bg:#fff;--modal-bg:#fff;--card-bg:#fff;
  --input-bg:#fff;--row-bg:#f9f9f6;--sticky-bg:#f5f5f0;
}
body.dark{
  --bg:#1a1a1a;--surface:#242424;--border:#333;--border2:#444;
  --text:#f0f0ee;--text2:#aaa;--text3:#888;--text4:#555;
  --green:#1D9E75;--green2:#25b585;--green3:#0F6E56;
  --green-bg:#0d2e22;--tag-bg:#2a2850;--tag-color:#a09ee0;
  --chip-bg:#2a2a2a;--nav-bg:#1e1e1e;--modal-bg:#242424;--card-bg:#242424;
  --input-bg:#2a2a2a;--row-bg:#2a2a2a;--sticky-bg:#1a1a1a;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(0.97)}
.btn-green{background:#1D9E75;border-color:#0F6E56;color:#fff}
.btn-green:hover{background:#0F6E56}
.btn-red{background:#fff0f0;border-color:#f0a0a0;color:#c00}
.btn-sm{padding:6px 11px;font-size:13px}
input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:inherit;font-size:15px;outline:none}
input:focus,select:focus,textarea:focus{border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,0.12)}
input.err,select.err{border-color:#c00!important}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.tag{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600;background:var(--tag-bg);color:var(--tag-color)}
.tag-s{background:var(--green-bg);color:#0F6E56}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:inherit}
.nav-btn.on{color:#1D9E75}
.nav-btn i{font-size:22px}
.app{max-width:480px;margin:0 auto;padding:0 0 90px}
.hdr{background:#1D9E75;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr h1{font-size:16px;font-weight:600}
.lbl{font-size:13px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.req{color:#c00}
.fg{margin-bottom:13px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.chips{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}
.chip.on{background:#1D9E75;border-color:#0F6E56;color:#fff;font-weight:500}
.plist{display:flex;flex-direction:column;gap:10px;padding:0 16px}
.pcard{display:flex;gap:12px;align-items:flex-start}
.pimg{width:56px;height:56px;border-radius:10px;background:#f0f0ea;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pimg img{width:100%;height:100%;object-fit:cover}
.pimg i{font-size:22px;color:#b0b0a8}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.div{height:1px;background:var(--border);margin:12px 0}
.tbar{background:var(--green-bg);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.qbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.camrow{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:10px;border:2px dashed #d0d0c8;background:var(--row-bg);color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px}
.camrow:hover{border-color:#1D9E75;color:#1D9E75}
.previmg{width:80px;height:80px;border-radius:10px;object-fit:cover;margin-top:8px;border:1px solid #e0e0d8}
.empty{text-align:center;padding:40px 20px;color:var(--text4);font-size:14px}
.empty i{font-size:38px;display:block;margin-bottom:10px}
.clickrow{cursor:pointer}
.clickrow:active{transform:scale(0.98)}
.ncrow{display:flex;gap:6px;margin-top:6px}
.sticky-top{position:sticky;top:56px;z-index:40;background:var(--bg);padding-bottom:2px}
.sticky-hdr{position:sticky;top:56px;z-index:40;background:var(--bg)}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media print{.no-print{display:none!important}body{background:var(--surface)}.app{padding:0}}
</style>
</head>
<body>

<div id="app">
  <div class="app no-print">

    <div class="hdr no-print">
      <h1>🪴 Betondeko</h1>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="save-status" style="display:none;font-size:12px;font-weight:500;padding:3px 8px;background:rgba(255,255,255,0.2);border-radius:8px"></span>
        <button onclick="toggleDark()" id="dark-btn" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px;line-height:1" title="Dunkelmodus"><i id="dark-icon" class="fa-solid fa-moon"></i></button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="pg-dash" class="hidden">
      <div style="padding:16px">
        <p style="font-size:18px;font-weight:700;margin-bottom:4px">Willkommen 🪴</p>
        <p id="dash-count" style="font-size:13px;color:var(--text3);margin-bottom:16px"></p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <button class="card" style="text-align:center;padding:16px;cursor:pointer;border:none;width:100%" onclick="showPage('search')">
            <i class="ti ti-search" style="font-size:28px;color:#1D9E75;display:block;margin-bottom:6px"></i>
            <span style="font-size:13px;font-weight:600">Suche</span>
          </button>
          <button class="card" style="text-align:center;padding:16px;cursor:pointer;border:none;width:100%" onclick="showPage('list')">
            <i class="ti ti-list" style="font-size:28px;color:#1D9E75;display:block;margin-bottom:6px"></i>
            <span style="font-size:13px;font-weight:600">Preisliste</span>
          </button>
          <button class="card" style="text-align:center;padding:16px;cursor:pointer;border:none;width:100%" onclick="showPage('del')">
            <i class="ti ti-file-text" style="font-size:28px;color:#1D9E75;display:block;margin-bottom:6px"></i>
            <span style="font-size:13px;font-weight:600">Lieferschein</span>
          </button>
          <button class="card" style="text-align:center;padding:16px;cursor:pointer;border:none;width:100%" onclick="showPage('admin')">
            <i class="ti ti-settings" style="font-size:28px;color:#1D9E75;display:block;margin-bottom:6px"></i>
            <span style="font-size:13px;font-weight:600">Verwalten</span>
          </button>
        </div>
        <div class="card" style="padding:16px">
          <p style="font-size:13px;font-weight:700;margin-bottom:12px">Kategorien</p>
          <canvas id="dash-chart" style="width:100%;max-height:260px"></canvas>
          <div id="dash-legend" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px"></div>
        </div>
      </div>
    </div>

    <!-- SUCHE -->
    <div id="pg-search">
      <div class="sticky-top" style="padding:10px 16px 0">
        <input type="search" id="s-input" placeholder="Artikel suchen..." oninput="renderSearch()" />
        <div class="chips" id="s-chips" style="padding:8px 0 4px;margin:0"></div>
      </div>
      <div id="fav-bar" class="hidden"></div>
      <div id="s-list" class="plist" style="padding-top:4px"></div>
    </div>

    <!-- LISTE -->
    <div id="pg-list" class="hidden">
      <div class="sticky-top">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px">
          <p style="font-size:16px;font-weight:600">Gesamtliste</p>
          <button class="btn btn-sm" onclick="openPrintDialog()"><i class="fa-solid fa-print"></i></button>
        </div>
        <div class="chips" id="l-chips" style="padding:0 16px 8px;margin:0"></div>
      </div>
      <div style="padding:0 16px" id="l-table"></div>
    </div>

    <!-- LIEFERSCHEIN -->
    <div id="pg-del" class="hidden">
      <div class="sticky-hdr" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px">
        <p style="font-size:16px;font-weight:600">Lieferscheine</p>
        <button class="btn btn-sm btn-green" onclick="openDelForm()"><i class="fa-solid fa-plus"></i></button>
      </div>
      <div id="del-list" style="padding:0 16px;display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <!-- ADMIN -->
    <div id="pg-admin" class="hidden">
      <div class="sticky-top">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px">
          <div>
            <p style="font-size:16px;font-weight:600">Produkte</p>
            <p id="admin-count" style="font-size:12px;color:#888;margin-top:1px"></p>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-green" onclick="openPF(null)"><i class="fa-solid fa-plus"></i></button>
            <button class="btn btn-sm btn-green" style="background:#0F6E56;border-color:#085041" onclick="openBulk()"><i class="fa-solid fa-copy"></i></button>
          </div>
        </div>
        <div style="padding:0 16px 8px">
          <input type="search" id="admin-search" placeholder="Produkt suchen..." oninput="renderAdmin()" style="font-size:14px" />
        </div>
        <div style="padding:0 16px 10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="toggleSel()"><i class="fa-solid fa-square-check" id="sel-ico"></i> <span id="sel-lbl">Auswählen</span></button>
          <button class="btn btn-sm btn-red hidden" id="btn-del-sel" onclick="deleteSelected()"><i class="fa-solid fa-trash"></i> (<span id="sel-cnt">0</span>)</button>
          <button class="btn btn-sm hidden" id="btn-exp-sel" onclick="exportCSV()"><i class="fa-solid fa-file-csv"></i></button>
          <button class="btn btn-sm" onclick="exportJSON()"><i class="fa-solid fa-download"></i></button>
          <button class="btn btn-sm" onclick="document.getElementById('imp-f').click()"><i class="fa-solid fa-upload"></i></button>
          <input type="file" id="imp-f" accept=".json" class="hidden" onchange="importJSON(event)" />
        </div>
      </div>
      <div id="admin-list" style="padding:0 16px;display:flex;flex-direction:column;gap:8px"></div>
    </div>

  </div>

  <nav class="nav no-print">
    <button class="nav-btn" id="nb-dash" onclick="showPage('dash')"><i class="ti ti-home"></i><span>Start</span></button>
    <button class="nav-btn on" id="nb-search" onclick="showPage('search')"><i class="ti ti-search"></i><span>Suche</span></button>
    <button class="nav-btn" id="nb-list" onclick="showPage('list')"><i class="ti ti-list"></i><span>Liste</span></button>
    <button class="nav-btn" id="nb-del" onclick="showPage('del')"><i class="ti ti-file-text"></i><span>Lieferschein</span></button>
    <button class="nav-btn" id="nb-admin" onclick="showPage('admin')"><i class="ti ti-settings"></i><span>Verwalten</span></button>
  </nav>
</div>

<!-- MODAL PRODUKT -->
<div id="m-prod" class="overlay hidden" onclick="if(event.target===this)closeM('m-prod')">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-sm" id="btn-prev-prod" onclick="navProd(-1)" title="Vorheriges Produkt"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="btn btn-sm" id="btn-next-prod" onclick="navProd(1)" title="Nächstes Produkt"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      <p style="font-size:15px;font-weight:600;margin:0" id="m-prod-title">Produkt</p>
      <button class="btn btn-sm" onclick="closeM('m-prod')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="fg"><label class="lbl">Name <span class="req">*</span></label><input id="f-name" placeholder="z.B. Froschkönig" /></div>
    <div class="r2">
      <div class="fg">
        <label class="lbl">Kategorie <span class="req">*</span></label>
        <select id="f-cat" onchange="onCatChg()"></select>
        <div id="nc-wrap" class="ncrow hidden">
          <input id="f-nc" placeholder="Neue Kategorie..." style="flex:1;font-size:13px;padding:7px 10px" />
          <button class="btn btn-sm btn-green" onclick="addCat()"><i class="fa-solid fa-check"></i></button>
          <button class="btn btn-sm" onclick="closeNewCat()"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <div class="fg">
        <label class="lbl">Saison <span class="req">*</span></label>
        <select id="f-season">
          <option value="Ganzjährig">Ganzjährig</option>
          <option value="Frühjahr/Sommer">Frühjahr/Sommer</option>
          <option value="Herbst/Winter">Herbst/Winter</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="lbl">Beschreibung</label><textarea id="f-desc" rows="2" placeholder="z.B. 28 cm, mit Holzfuß..."></textarea></div>
    <div class="fg">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;margin-bottom:8px">
        <input type="checkbox" id="f-customprice" style="width:18px;height:18px;accent-color:#1D9E75" onchange="toggleCustomPrice()">
        <span>Preis nach Größe</span>
      </label>
    </div>
    <div id="price-fields">
    <div class="r2">
      <div class="fg"><label class="lbl">Preis (€) <span class="req">*</span></label><input id="f-price" type="number" step="0.5" min="0" placeholder="0,00" /></div>
      <div class="fg"><label class="lbl">Preis 2 (€)</label><input id="f-price2" type="number" step="0.5" min="0" placeholder="optional" /></div>
    </div>
    <div class="fg"><label class="lbl">Preis-Label</label><input id="f-plbl" placeholder="z.B. Klein / Groß" /></div>
    </div>
    <div class="fg">
      <label class="lbl">Foto</label>
      <button class="camrow" onclick="document.getElementById('f-cam').click()"><i class="ti ti-camera" style="font-size:20px"></i> Kamera öffnen</button>
      <input type="file" id="f-cam" accept="image/*" capture="environment" class="hidden" onchange="handleImg(event)" />
      <button class="camrow" style="border-color:#c0c0c8;color:#888" onclick="document.getElementById('f-gal').click()"><i class="ti ti-photo" style="font-size:20px"></i> Aus Galerie wählen</button>
      <input type="file" id="f-gal" accept="image/*" class="hidden" onchange="handleImg(event)" />
      <input id="f-img" placeholder="oder Bild-URL" style="font-size:13px;margin-top:6px" oninput="prevImg()" />
      <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
        <img id="f-prev" class="previmg hidden" alt="Vorschau" />
        <button id="f-clr" class="btn btn-sm btn-red hidden" onclick="clearImg()"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
    <div class="fg"><label class="lbl">Lagerbestand</label><input id="f-stock" type="number" min="0" placeholder="Stückzahl (optional)" /></div>
    <div style="display:flex;gap:16px;margin-bottom:13px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="f-soldout" style="width:18px;height:18px;accent-color:#c00;flex-shrink:0">
        <span>Ausverkauft</span>
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="f-fav" style="width:18px;height:18px;accent-color:#f0a000;flex-shrink:0">
        <span>⭐ Favorit</span>
      </label>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-green" style="flex:1;justify-content:center" onclick="saveProd()"><i class="fa-solid fa-floppy-disk"></i></button>
      <button class="btn btn-sm hidden" id="btn-copy-p" onclick="copyProd()" title="Kopieren"><i class="fa-solid fa-copy"></i></button>
      <button class="btn btn-red btn-sm hidden" id="btn-del-p" onclick="deleteProd()"><i class="fa-solid fa-trash"></i></button>
    </div>
  </div>
</div>

<!-- MODAL MEHRERE -->
<div id="m-bulk" class="overlay hidden" onclick="if(event.target===this)closeM('m-bulk')">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <p style="font-size:15px;font-weight:600;margin:0">Mehrere hinzufügen</p>
      <button class="btn btn-sm" onclick="closeM('m-bulk')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:14px">Felder ausfüllen, + für weitere Zeile</p>
    <div id="bulk-rows" style="display:flex;flex-direction:column;gap:10px"></div>
    <button class="btn btn-sm" style="margin-top:10px;width:100%;justify-content:center;border-style:dashed" onclick="addBulkRow()"><i class="fa-solid fa-plus"></i></button>
    <div class="div"></div>
    <button class="btn btn-green" style="width:100%;justify-content:center;padding:12px" onclick="saveBulk()"><i class="fa-solid fa-floppy-disk"></i></button>
  </div>
</div>

<!-- MODAL LIEFERSCHEIN NEU -->
<div id="m-del" class="overlay hidden" onclick="if(event.target===this)closeM('m-del')">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <p style="font-size:15px;font-weight:600;margin:0">Neuer Lieferschein</p>
      <button class="btn btn-sm" onclick="closeM('m-del')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="r2">
      <div class="fg"><label class="lbl">Empfänger</label><input id="d-shop" placeholder="Geschäft / Name" /></div>
      <div class="fg"><label class="lbl">Datum</label><input id="d-date" type="date" /></div>
    </div>
    <div class="div"></div>
    <p style="font-size:14px;font-weight:600;margin-bottom:10px">Artikel wählen</p>
    <input type="search" id="d-s" placeholder="Suchen..." oninput="filterDel(this.value)" style="margin-bottom:10px" />
    <div id="d-picker" style="max-height:220px;overflow-y:auto"></div>
    <div class="div"></div>
    <p style="font-size:14px;font-weight:600;margin-bottom:8px">Sonderwünsche / Extras</p>
    <div id="d-extras" style="display:flex;flex-direction:column;gap:6px"></div>
    <button class="btn btn-sm" style="margin-top:6px;border-style:dashed;width:100%;justify-content:center" onclick="addExtra()"><i class="fa-solid fa-plus"></i></button>
    <div class="div"></div>
    <p id="d-sum" style="font-size:13px;color:#888;margin-bottom:12px">Noch keine Artikel</p>
    <button class="btn btn-green" style="width:100%;justify-content:center;padding:12px" onclick="saveDel()"><i class="fa-solid fa-floppy-disk"></i></button>
  </div>
</div>

<!-- MODAL LIEFERSCHEIN ANSICHT -->
<div id="m-del-view" class="overlay hidden" onclick="if(event.target===this)closeM('m-del-view')">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <p style="font-size:15px;font-weight:600;margin:0">Lieferschein</p>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="printDel()"><i class="fa-solid fa-print"></i></button>
        <button class="btn btn-sm" onclick="closeM('m-del-view')"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
    <div id="d-view"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-sm" onclick="printLabelsFromDel()"><i class="fa-solid fa-tag"></i></button>
      <button class="btn btn-red btn-sm" onclick="deleteDel()"><i class="fa-solid fa-trash"></i></button>
    </div>
  </div>
</div>

// Daten in Google Apps Script speichern (als POST mit JSON-Body)
async function gasSave(obj){
  var body = {action: 'save'};
  if(obj.products)   body.products   = JSON.stringify(obj.products);
  if(obj.deliveries) body.deliveries = JSON.stringify(obj.deliveries);
  if(obj.customCats) body.customCats = JSON.stringify(obj.customCats);
  var r = await fetch(GAS_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('GAS Fehler: ' + r.status);
}

async function init(){
  var de = document.getElementById('d-date');
  if(de) de.value = new Date().toISOString().split('T')[0];

  // 1. Zuerst GAS laden - das ist die einzige Quelle der Wahrheit
  try {
    var gasData = await gasLoad();
    if(gasData && gasData.products && gasData.products.length > 0){
      // GAS hat Daten - diese IMMER verwenden
      prods    = gasData.products;
      dels     = gasData.deliveries || [];
      custCats = gasData.customCats || [];
      localStorage.setItem('bp', JSON.stringify(prods));
      localStorage.setItem('bd', JSON.stringify(dels));
      localStorage.setItem('bc', JSON.stringify(custCats));
      buildChips();renderSearch();renderList();renderDels();renderAdmin();
      return; // Fertig - nichts weiter tun
    }
  } catch(e) {
    console.log('GAS nicht erreichbar:', e);
  }

  // 2. GAS nicht erreichbar oder leer - lokalen Cache prüfen
  var cached = ls('bp', null);
  if(cached && cached.length > 0){
    // Lokaler Cache vorhanden - verwenden
    prods    = cached;
    dels     = ls('bd', []);
    custCats = ls('bc', []);
    buildChips();renderSearch();renderList();renderDels();renderAdmin();
    // Cache in GAS hochladen
    gasSave({products:prods, deliveries:dels, customCats:custCats});
    return;
  }

  // 3. Weder GAS noch Cache - nur dann Standardprodukte laden
  prods    = defProds();
  dels     = [];
  custCats = [];
  localStorage.setItem('bp', JSON.stringify(prods));
  gasSave({products:prods, deliveries:dels, customCats:custCats});
  buildChips();renderSearch();renderList();renderDels();renderAdmin();
}

function fmt(n){return (Math.round((n||0)*100)/100).toFixed(2).replace('.',',');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'';var d=new Date(s+'T12:00:00');return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function closeM(id){document.getElementById(id).classList.add('hidden');}

// CHIPS
function buildChips(){
  var usedCats=[];
  prods.forEach(function(p){if(usedCats.indexOf(p.cat)<0)usedCats.push(p.cat);});
  usedCats.sort(function(a,b){return a.localeCompare(b,'de');});
  var cats=['Alle'].concat(usedCats);
  document.getElementById('s-chips').innerHTML=cats.map(function(c){
    return '<button class="chip'+(c===sCatFilter?' on':'')+'" onclick="sCatFilter=\''+esc(c)+'\';document.querySelectorAll(\'#s-chips .chip\').forEach(function(e){e.classList.remove(\'on\')});this.classList.add(\'on\');renderSearch()">'+esc(c)+'</button>';
  }).join('');
  document.getElementById('l-chips').innerHTML=cats.map(function(c){
    return '<button class="chip'+(c===lCatFilter?' on':'')+'" onclick="lCatFilter=\''+esc(c)+'\';document.querySelectorAll(\'#l-chips .chip\').forEach(function(e){e.classList.remove(\'on\')});this.classList.add(\'on\');renderList()">'+esc(c)+'</button>';
  }).join('');
}

function setSCat(c,el){sCatFilter=c;document.querySelectorAll('#s-chips .chip').forEach(function(e){e.classList.remove('on');});el.classList.add('on');renderSearch();}
function setLCat(c,el){lCatFilter=c;document.querySelectorAll('#l-chips .chip').forEach(function(e){e.classList.remove('on');});el.classList.add('on');renderList();}

// SUCHE mit Sortierung + Autocomplete (Funktionen 2,3,4,20)
function renderSearch(){
  var q=(document.getElementById('s-input').value||'').toLowerCase();
  var sort=document.getElementById('s-sort')?document.getElementById('s-sort').value:'name-az';

  // Favoriten-Leiste
  var favs=prods.filter(function(p){return p.fav;});
  var favBar=document.getElementById('fav-bar');
  if(favBar){
    if(favs.length){
      favBar.innerHTML='<div style="padding:8px 16px 0;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">⭐ Favoriten</div>'
        +'<div style="display:flex;gap:8px;padding:6px 16px 8px;overflow-x:auto;scrollbar-width:none">'
        +favs.map(function(p){return'<button onclick="quickOpenFav('+p.id+')" style="white-space:nowrap;padding:6px 12px;border-radius:20px;border:1px solid #f0a000;background:#fff8e6;color:#a06000;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">'+esc(p.name)+'</button>';}).join('')
        +'</div>';
      favBar.classList.remove('hidden');
    } else {
      favBar.classList.add('hidden');
    }
  }

  var f=prods.filter(function(p){
    var cOk=sCatFilter==='Alle'||p.cat===sCatFilter;
    var qOk=!q||p.name.toLowerCase().indexOf(q)>-1||p.cat.toLowerCase().indexOf(q)>-1||(p.desc||'').toLowerCase().indexOf(q)>-1;
    return cOk&&qOk;
  });

  // Sortierung
  f.sort(function(a,b){
    if(sort==='name-az')return a.name.localeCompare(b.name,'de');
    if(sort==='name-za')return b.name.localeCompare(a.name,'de');
    if(sort==='cat')return a.cat.localeCompare(b.cat,'de');
    if(sort==='price-asc')return (a.price||0)-(b.price||0);
    if(sort==='price-desc')return (b.price||0)-(a.price||0);
    if(sort==='changed')return ((b.changed||0)-(a.changed||0));
    return a.name.localeCompare(b.name,'de');
  });

  var el=document.getElementById('s-list');
  if(!f.length){el.innerHTML='<div class="empty"><i class="ti ti-mood-empty"></i>Nichts gefunden</div>';return;}
  el.innerHTML=f.map(function(p){
    var catColor=getCatColor(p.cat);
    var ph=p.price2&&p.priceLabel?'<span style="font-size:11px;color:#0F6E56">'+esc(p.priceLabel)+': '+fmt(p.price)+' / '+fmt(p.price2)+' €</span>':'';

function getCatColor(cat){
  if(!catColors[cat]){
    var cats=allCats();
    var idx=cats.indexOf(cat);

  }
  return catColors[cat];
}

function renderDelPicker(list){
  // Artikel mit 2 Preisen als 2 separate Zeilen
  // Globaler Index statt ID als Schlüssel
  window._delRows=[];
  list.forEach(function(p){
    if(p.price2&&p.priceLabel){
      var lbl1=(p.priceLabel.split('/')[0]||'').trim();
      var lbl2=(p.priceLabel.split('/')[1]||'').trim();
      window._delRows.push({key:window._delRows.length,name:p.name,subname:lbl1,price:p.price,orig:p});
      window._delRows.push({key:window._delRows.length,name:p.name,subname:lbl2,price:p.price2,orig:p});
    } else {
      if(p.customPrice){
        window._delRows.push({key:window._delRows.length,name:p.name,subname:'Preis nach Größe',price:0,customPrice:true,orig:p});
      } else {
        window._delRows.push({key:window._delRows.length,name:p.name,subname:'',price:p.price,orig:p});
      }
    }
  });
  document.getElementById('d-picker').innerHTML=window._delRows.map(function(r){
    var qty=delBasket[r.key]||0;
    var priceDisplay=r.customPrice
      ?'<input type="number" step="0.5" min="0" placeholder="Preis" id="dcp'+r.key+'" onchange="setCustomPrice('+r.key+',this.value)" style="width:70px;font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid #d0d0c8" />'
      :'<p style="font-size:11px;color:#0F6E56;font-weight:600">'+fmt(r.price)+' €</p>';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">'
      +'<div style="flex:1;min-width:0">'
      +'<p style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.name)+(r.subname?' <span style="font-weight:400;color:#888;font-size:12px">('+esc(r.subname)+')</span>':'')+'</p>'
      +priceDisplay
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:4px">'
      +'<button class="qbtn" onclick="chgQty('+r.key+',-1)">−</button>'
      +'<span style="font-size:14px;font-weight:600;min-width:22px;text-align:center" id="dq'+r.key+'">'+qty+'</span>'
      +'<button class="qbtn" onclick="chgQty('+r.key+',1)">+</button>'
      +'</div></div>';
  }).join('');
}

function setCustomPrice(key,val){
  var row=(window._delRows||[])[parseInt(key)];
  if(row)row.price=parseFloat(val)||0;
  updDelSum();
}

function chgQty(key,d){
  if(!delBasket[key])delBasket[key]=0;
  delBasket[key]=Math.max(0,delBasket[key]+d);
  var el=document.getElementById('dq'+key);
  if(el)el.textContent=delBasket[key];
  if(!delBasket[key])delete delBasket[key];
  updDelSum();
}

function updDelSum(){
  var cnt=0,tot=0;
  for(var key in delBasket){
    var qty=delBasket[key];
    var row=window._delRows[parseInt(key)];
    if(row&&qty){cnt+=qty;tot+=qty*row.price;}
  }
  document.querySelectorAll('.extra-row').forEach(function(r){
    var p=parseFloat(r.querySelector('.ep').value)||0;
    var q=parseInt(r.querySelector('.eq').value)||0;
    cnt+=q;tot+=q*p;
  });
  document.getElementById('d-sum').textContent=cnt?cnt+' Artikel · '+fmt(tot)+' €':'Noch keine Artikel';
}

function saveDel(){
  var shop=document.getElementById('d-shop').value.trim();
  var date=document.getElementById('d-date').value;
  if(!date){alert('Bitte Datum eingeben.');return;}
  var items=[],tot=0;
  for(var key in delBasket){
    var qty=delBasket[key];
    if(!qty)continue;
    var row=(window._delRows||[])[parseInt(key)];
    if(!row)continue;
    var label=row.name+(row.subname?' ('+row.subname+')':'');
    items.push({id:row.orig.id,name:label,qty:qty,price:row.price,cat:row.orig.cat});
    tot+=qty*row.price;
  }
  // Sonderwünsche
  document.querySelectorAll('.extra-row').forEach(function(r){
    var name=r.querySelector('.en').value.trim();
    var price=parseFloat(r.querySelector('.ep').value)||0;
    var qty=parseInt(r.querySelector('.eq').value)||0;
    if(name&&qty){
      items.push({id:'extra',name:name,qty:qty,price:price,cat:'Sonderwunsch'});
      tot+=qty*price;
    }
  });
  if(!items.length){alert('Bitte Artikel hinzufügen.');return;}
  dels.push({id:Date.now().toString(),shop:shop,date:date,items:items,total:Math.round(tot*100)/100,created:new Date().toISOString()});
  lss('bd',dels);closeM('m-del');renderDels();
}

function handleImg(e){
  var f=e.target.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=800;
      var scale=img.width>maxW?maxW/img.width:1;
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      var compressed=canvas.toDataURL('image/jpeg',0.8);
      document.getElementById('f-img').value=compressed;
      document.getElementById('f-prev').src=compressed;
      document.getElementById('f-prev').classList.remove('hidden');
      document.getElementById('f-clr').classList.remove('hidden');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
}

function printLabels(items){
  // items: [{name, sub, price, qty}]
  // Pro Artikel qty-mal das Schild drucken
  var rows=[];
  items.forEach(function(r){
    var times=r.qty||1;
    for(var i=0;i<times;i++){
      rows.push(r);
    }
  });

  var labels=rows.map(function(r){
    return '<div class="label">'
      +'<div class="hole"></div>'
      +'<div class="label-name">'+esc(r.name)+'</div>'
      +(r.sub?'<div class="label-sub">'+esc(r.sub)+'</div>':'')
      +'<div class="label-price">'+esc(r.price)+'</div>'
      +'</div>';
  }).join('');

  var css=[
    '*{box-sizing:border-box;margin:0;padding:0}',
    'body{font-family:Arial,Helvetica,sans-serif;background:#fff}',
    '@page{size:A4;margin:0}',
    '.page{width:210mm;min-height:297mm;padding:15mm;display:flex;flex-wrap:wrap;align-content:flex-start}',
    '.label{width:25mm;height:50mm;border-right:0.3px solid #ccc;border-bottom:0.3px solid #ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3mm 2mm;text-align:center;position:relative;break-inside:avoid}',
    '.label:nth-child(7n){border-right:none}',
    '.hole{width:5mm;height:5mm;border-radius:50%;border:0.5px solid #bbb;position:absolute;top:2.5mm;left:50%;transform:translateX(-50%)}',
    '.label-name{font-size:7pt;font-weight:bold;line-height:1.2;margin-top:7mm;word-break:break-word}',
    '.label-sub{font-size:6pt;color:#666;margin-top:1mm}',
    '.label-price{font-size:10pt;font-weight:bold;margin-top:2mm}'
  ].join('');

  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Preisschilder</title><style>'+css+'</style></head><body>'
    +'<div class="page">'+labels+'</div>'
    +'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},600);
}

// EXPORT / IMPORT
function exportJSON(){
  var data = JSON.stringify({products:prods,deliveries:dels,customCats:custCats},null,2);
  // Als daten.json exportieren (für Netlify Upload)
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download='daten.json';a.click();URL.revokeObjectURL(url);
}

function importJSON(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.products){prods=d.products;lss('bp',prods);}
      if(d.deliveries){dels=d.deliveries;lss('bd',dels);}
      if(d.customCats){custCats=d.customCats;lss('bc',custCats);}
      buildChips();renderSearch();renderList();renderDels();renderAdmin();
      alert('Import erfolgreich!');
    }catch(err){alert('Fehler beim Import.');}
  };r.readAsText(f);
}

// NAV
function showPage(p){
  ['dash','search','list','del','admin'].forEach(function(x){
    document.getElementById('pg-'+x).classList.add('hidden');
    document.getElementById('nb-'+x).classList.remove('on');
  });
  document.getElementById('pg-'+p).classList.remove('hidden');
  document.getElementById('nb-'+p).classList.add('on');
  if(p==='dash') renderDashboard();
}

// DARK MODE (Funktion 18)
function toggleDark(){
  var isDark=document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark?'1':'0');
  document.getElementById('dark-icon').className=isDark?'fa-solid fa-sun':'fa-solid fa-moon';
}

function initDark(){
  if(localStorage.getItem('darkMode')==='1'){
    document.body.classList.add('dark');
    var icon=document.getElementById('dark-icon');
    if(icon)icon.className='fa-solid fa-sun';
  }
}

// BULK PREIS 2 TOGGLE (Funktion 24)
function toggleBulkPrice2(cb){
  var row=cb.closest('div').parentElement;
  var extra=row.querySelector('.bp2-extra');
  if(extra)extra.classList.toggle('hidden',!cb.checked);
}

// DASHBOARD (Funktion 26+27)
function renderDashboard(){
  var total=prods.length;
  var soldout=prods.filter(function(p){return p.soldout;}).length;
  var favs=prods.filter(function(p){return p.fav;}).length;
  var cnt=document.getElementById('dash-count');
  if(cnt)cnt.textContent=total+' Artikel · '+soldout+' ausverkauft · '+favs+' Favoriten';

  // Kategorien zählen
  var cats={};
  prods.forEach(function(p){cats[p.cat]=(cats[p.cat]||0)+1;});
  var catKeys=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];});
  var colors=catKeys.map(function(c){return getCatColor(c);});
  var values=catKeys.map(function(c){return cats[c];});

  // Canvas Kreisdiagramm
  var canvas=document.getElementById('dash-chart');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var size=Math.min(canvas.offsetWidth||260,260);
  canvas.width=size;canvas.height=size;
  var cx=size/2,cy=size/2,r=size*0.38,ri=size*0.22;
  var total2=values.reduce(function(a,b){return a+b;},0);
  var angle=-Math.PI/2;
  ctx.clearRect(0,0,size,size);
  values.forEach(function(v,i){
    var slice=(v/total2)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle=colors[i];
    ctx.fill();
    angle+=slice;
  });
  // Innerer Kreis (Donut)
  ctx.beginPath();
  ctx.arc(cx,cy,ri,0,Math.PI*2);
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--surface')||'#fff';
  ctx.fill();
  // Mitte Text
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text')||'#111';
  ctx.font='bold '+Math.round(size*0.1)+'px Arial';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(total,cx,cy-size*0.04);
  ctx.font=Math.round(size*0.06)+'px Arial';
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text3')||'#888';
  ctx.fillText('Artikel',cx,cy+size*0.07);

  // Legende
  var legend=document.getElementById('dash-legend');
  if(legend){
    legend.innerHTML=catKeys.map(function(c,i){
      return '<div style="display:flex;align-items:center;gap:5px;font-size:11px">'
        +'<span style="width:10px;height:10px;border-radius:50%;background:'+colors[i]+';flex-shrink:0"></span>'
        +'<span style="color:var(--text2)">'+esc(c)+' ('+cats[c]+')</span>'
        +'</div>';
    }).join('');
  }
}

window.onload = function(){ initDark(); init(); };
